                  <td style="color:var(--muted-fg);font-size:11px;">${i+1}</td>
                  <td><span class="badge badge-purple">${escHtml(r.oyun)}</span></td>
                  <td style="font-weight:500;">${escHtml(r.kisi)}</td>
                  <td style="color:var(--muted-fg);font-size:12px;">${escHtml(r.gorev)}</td>
                  <td><span class="badge ${categoryBadge(r.kategori)}">${escHtml(r.kategori)}</span></td>
                </tr>`).join('')}</tbody>
              </table></div>`)}
          </div>
        </div>
        </div>`;
    }

    window.figuranTab = t => { tab=t; renderAll(); };
    window.figuranSearch = v => { search=v; renderAll(); };
    window.figuranExcel = () => {
      let tsv='';
      if(tab==='liste'){
        const fL=getFilteredListe();
        tsv=[listeHeaders.join('\t'),...fL.map(row=>listeHeaders.map((_,i)=>String(row[i]??'')).join('\t'))].join('\n');
      } else {
        const fO=getFilteredOyun();
        tsv=['Oyun\tKişi\tGörev\tKategori',...fO.map(r=>`${r.oyun}\t${r.kisi}\t${r.gorev}\t${r.kategori}`)].join('\n');
      }
      navigator.clipboard.writeText(tsv).then(()=>alert('Kopyalandı!'));
    };
    renderAll();
  } catch(e) {
    pg.innerHTML = `<div class="empty"><p>Veri yüklenemedi: ${e.message}</p></div>`;
  }
}

/* ═══════════════════════════════════════════════════════════════
   GRAFİKLER
═══════════════════════════════════════════════════════════════ */
async function renderGrafik() {
  const pg = document.getElementById('page');
  try {
    const data = await fetchSheet('BÜTÜN OYUNLAR');
    const allRows = parsePlayRows(data.headers, data.rows);
    const people = groupByPerson(allRows);

    // Aktif kişiler
    const topKisi = people.filter(p=>p.aktif).slice(0,25).map(p=>({name:p.name,value:p.oyunlar.length}));
    const sortedPlays = groupByPlay(allRows.filter(r=>r.aktif)).sort((a,b)=>b.personelCount-a.personelCount);
    const oyunBuyuk = sortedPlays.slice(0,20).map(p=>({name:p.name.length>28?p.name.slice(0,26)+'…':p.name,fullName:p.name,value:p.personelCount}));
    const oyunKucuk = [...sortedPlays].reverse().slice(0,20).map(p=>({name:p.name.length>28?p.name.slice(0,26)+'…':p.name,fullName:p.name,value:p.personelCount}));

    const katCounts = new Map();
    allRows.filter(r=>r.aktif).forEach(r=>{const k=r.kategori.trim();if(k)katCounts.set(k,(katCounts.get(k)||0)+1);});
    const sortedKat = Array.from(katCounts.entries()).sort((a,b)=>b[1]-a[1]);
    const TOP=12;
    const katData = sortedKat.slice(0,TOP);
    const diger = sortedKat.slice(TOP).reduce((s,([,v])=>s+v),0);
    if(diger>0) katData.push(['Diğer',diger]);
    const kategoriData = katData.map(([name,value])=>({name,value}));

    let activeChart = 'kisi';
    let oyunSubTab = 'buyuk';
    let activeKatIdx = 0;

    function getKatPersons(idx) {
      if(!kategoriData[idx]) return [];
      const katName=kategoriData[idx].name;
      const byP=new Map();
      const aktifRows=allRows.filter(r=>r.aktif);
      if(katName==='Diğer'){
        const topNames=new Set(kategoriData.filter(k=>k.name!=='Diğer').map(k=>k.name));
        aktifRows.filter(r=>r.kategori.trim()&&!topNames.has(r.kategori.trim())).forEach(r=>{
          r.kisi.split(',').forEach(k=>{const t=k.trim();if(!t)return;if(!byP.has(t))byP.set(t,new Set());byP.get(t).add(r.kategori.trim());});
        });
      } else {
        aktifRows.filter(r=>r.kategori.trim()===katName).forEach(r=>{
          r.kisi.split(',').forEach(k=>{const t=k.trim();if(!t)return;if(!byP.has(t))byP.set(t,new Set());byP.get(t).add(r.gorev);});
        });
      }
      return Array.from(byP.entries()).map(([name,roles])=>({name,roles:Array.from(roles)})).sort((a,b)=>a.name.localeCompare(b.name,'tr'));
    }

    function renderAll() {
      const katPersons = getKatPersons(activeKatIdx);
      pg.innerHTML = `
        <div style="flex:1;overflow-y:auto;">
        <div style="padding:12px 16px;border-bottom:1px solid var(--border);background:var(--card);display:flex;flex-wrap:wrap;align-items:center;gap:10px;justify-content:space-between;">
          <div class="tab-bar">
            ${[['kisi','En Çok Oyuna Katılanlar'],['oyun','Oyun Kadroları'],['kategori','Kategori Dağılımı']].map(([k,l])=>`
              <button class="tab-btn${activeChart===k?' active':''}" onclick="grafikTab(${jsq(k)})">${l}</button>`).join('')}
          </div>
          <button class="btn btn-outline" onclick="grafikExcel()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Excel
          </button>
        </div>

        <div style="padding:16px;max-width:900px;display:flex;flex-direction:column;gap:16px;">
          ${activeChart==='kisi'?`
          <div class="card" style="padding:16px;">
            <h3 style="font-size:13px;font-weight:700;margin-bottom:4px;">En Çok Oyuna Katılan 25 Kişi</h3>
            <p style="font-size:11px;color:var(--muted-fg);margin-bottom:14px;">Çubuğa tıklayarak personel dağılımına gidin</p>
            <div style="overflow-x:auto;">
              <canvas id="chart-kisi" style="max-height:580px;"></canvas>
            </div>
          </div>`:''}

          ${activeChart==='oyun'?`
          <div class="card" style="padding:16px;">
            <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:14px;">
              <h3 style="font-size:13px;font-weight:700;">Oyun Kadroları</h3>
              <div style="display:flex;border:1px solid var(--border);border-radius:7px;overflow:hidden;">
                <button onclick="grafikOyunSub('buyuk')" style="padding:5px 12px;font-size:11px;font-weight:700;transition:all 0.15s;${oyunSubTab==='buyuk'?'background:var(--sidebar);color:var(--sidebar-primary);':'color:var(--muted-fg);'}">En Büyük 20</button>
                <button onclick="grafikOyunSub('kucuk')" style="padding:5px 12px;font-size:11px;font-weight:700;border-left:1px solid var(--border);transition:all 0.15s;${oyunSubTab==='kucuk'?'background:var(--sidebar);color:var(--sidebar-primary);':'color:var(--muted-fg);'}">En Küçük 20</button>
              </div>
              <p style="font-size:11px;color:var(--muted-fg);">Tıklayarak oyuna gidin</p>
            </div>
            <div style="overflow-x:auto;">
              <canvas id="chart-oyun" style="max-height:540px;"></canvas>
            </div>
          </div>`:''}

          ${activeChart==='kategori'?`
          <div class="card" style="padding:16px;">
            <h3 style="font-size:13px;font-weight:700;margin-bottom:4px;">Kategori Dağılımı</h3>
            <p style="font-size:11px;color:var(--muted-fg);margin-bottom:14px;">Kategoriye tıklayarak o kategorideki kişileri görün</p>
            <div style="display:flex;flex-wrap:wrap;gap:20px;align-items:flex-start;">
              <div style="width:260px;min-width:220px;flex-shrink:0;">
                <canvas id="chart-kat" style="max-height:260px;"></canvas>
              </div>
              <div style="flex:1;min-width:200px;display:grid;grid-template-columns:1fr 1fr;gap:4px;">
                ${kategoriData.map((item,i)=>`<button onclick="grafikKatSelect(${i})" style="display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:7px;text-align:left;border:1px solid ${activeKatIdx===i?'var(--border)':'transparent'};background:${activeKatIdx===i?'hsla(38,18%,92%,0.5)':'transparent'};">
                  <div style="width:10px;height:10px;border-radius:3px;background:${PALETTE[i%PALETTE.length]};flex-shrink:0;"></div>
                  <span style="font-size:11px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${escHtml(item.name)}</span>
                  <span style="font-size:11px;font-weight:700;color:${PALETTE[i%PALETTE.length]};flex-shrink:0;">${item.value}</span>
                </button>`).join('')}
              </div>
              ${katPersons.length?`
              <div style="width:100%;max-width:300px;border:1px solid var(--border);border-radius:10px;padding:12px;background:hsla(38,18%,92%,0.1);">
                <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;">
                  <div style="width:10px;height:10px;border-radius:3px;background:${PALETTE[activeKatIdx%PALETTE.length]};flex-shrink:0;"></div>
                  <h4 style="font-size:12px;font-weight:700;flex:1;">${escHtml(kategoriData[activeKatIdx]?.name||'')}</h4>
                  <span style="font-size:11px;color:var(--muted-fg);">${katPersons.length} kişi</span>
                  <button onclick="grafikKatCopy()" style="padding:4px;border-radius:5px;color:var(--muted-fg);" title="Kopyala">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                  </button>
                </div>
                <div style="max-height:360px;overflow-y:auto;display:flex;flex-direction:column;gap:2px;">
                  ${katPersons.map(({name,roles})=>`<button onclick="navigateTo('dagilim',{kisi:${jsq(name)}})" style="text-align:left;padding:7px 10px;border-radius:7px;transition:background 0.1s;" onmouseover="this.style.background='hsla(38,18%,92%,0.5)'" onmouseout="this.style.background=''">
                    <p style="font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${escHtml(name)}</p>
                    <p style="font-size:10px;color:var(--muted-fg);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${escHtml(roles.join(', '))}</p>
                  </button>`).join('')}
                </div>
              </div>`:''
              }
            </div>
          </div>`:''}
        </div>
        </div>`;

      // Chart.js render
      requestAnimationFrame(() => {
        if (activeChart==='kisi') {
          const canvas = document.getElementById('chart-kisi');
          if (!canvas) return;
          canvas.height = Math.max(topKisi.length * 22, 200);
          chartInstances['kisi'] = new Chart(canvas, {
            type:'bar',
            data:{
              labels:topKisi.map(d=>d.name),
              datasets:[{data:topKisi.map(d=>d.value),backgroundColor:topKisi.map((_,i)=>PALETTE[i%PALETTE.length]+'DD'),borderRadius:4}]
            },
            options:{
              indexAxis:'y',responsive:true,maintainAspectRatio:false,
              plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>`${ctx.parsed.x} oyun`}}},
              scales:{x:{ticks:{font:{size:10}}},y:{ticks:{font:{size:10}}}},
              onClick:(_,elements)=>{
                if(elements.length){ const name=topKisi[elements[0].index].name; navigateTo('dagilim',{kisi:name}); }
              }
            }
          });
        }
        if (activeChart==='oyun') {
          const canvas = document.getElementById('chart-oyun');
          if (!canvas) return;
          const src = oyunSubTab==='buyuk'?oyunBuyuk:oyunKucuk;
          canvas.height = Math.max(src.length * 22, 200);
          chartInstances['oyun'] = new Chart(canvas, {
            type:'bar',
            data:{
              labels:src.map(d=>d.name),
              datasets:[{data:src.map(d=>d.value),backgroundColor:src.map((_,i)=>PALETTE[i%PALETTE.length]+'DD'),borderRadius:4}]
            },
            options:{
              indexAxis:'y',responsive:true,maintainAspectRatio:false,
              plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>`${ctx.parsed.x} kişi`}}},
              scales:{x:{ticks:{font:{size:10}}},y:{ticks:{font:{size:9}}}},
              onClick:(_,elements)=>{
                if(elements.length){ const play=src[elements[0].index].fullName; navigateTo('home',{oyun:play}); }
              }
            }
          });
        }
        if (activeChart==='kategori') {
          const canvas = document.getElementById('chart-kat');
          if (!canvas) return;
          chartInstances['kat'] = new Chart(canvas, {
            type:'doughnut',
            data:{
              labels:kategoriData.map(d=>d.name),
              datasets:[{data:kategoriData.map(d=>d.value),backgroundColor:kategoriData.map((_,i)=>PALETTE[i%PALETTE.length])}]
            },
            options:{
              responsive:true,maintainAspectRatio:false,
              plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>`${ctx.label}: ${ctx.parsed}`}}},
              onClick:(_,elements)=>{ if(elements.length){ activeKatIdx=elements[0].index; renderAll(); } }
            }
          });
        }
      });
    }

    window.grafikTab = t => { activeChart=t; renderAll(); };
    window.grafikOyunSub = t => { oyunSubTab=t; renderAll(); };
    window.grafikKatSelect = i => { activeKatIdx=i; renderAll(); };
    window.grafikKatCopy = () => {
      const kp=getKatPersons(activeKatIdx);
      const katName=kategoriData[activeKatIdx]?.name||'';
      const lines=[`Kategori: ${katName}`,'',...kp.map(({name,roles})=>`${name}\t${roles.join(', ')}`)];
      navigator.clipboard.writeText(lines.join('\n')).then(()=>alert('Kopyalandı!'));
    };
    window.grafikExcel = () => {
      let tsv='';
      if(activeChart==='kisi') tsv=['Kişi\tOyun Sayısı',...topKisi.map(d=>`${d.name}\t${d.value}`)].join('\n');
      else if(activeChart==='oyun'){const src=oyunSubTab==='buyuk'?oyunBuyuk:oyunKucuk;tsv=['Oyun\tPersonel Sayısı',...src.map(d=>`${d.fullName}\t${d.value}`)].join('\n');}
      else tsv=['Kategori\tSayı',...kategoriData.map(d=>`${d.name}\t${d.value}`)].join('\n');
      navigator.clipboard.writeText(tsv).then(()=>alert('Kopyalandı!'));
    };

    renderAll();
  } catch(e) {
    pg.innerHTML = `<div class="empty"><p>Veri yüklenemedi: ${e.message}</p></div>`;
  }
}

/* ═══════════════════════════════════════════════════════════════
   MÜSAİT PERSONEL (gorevli-olmayan)
═══════════════════════════════════════════════════════════════ */
async function renderMusait() {
  const SHEET = 'GÖREVLİ OLMAYAN';
  const DEFAULT_HEADERS = ['Kişi','Kategori','Başlangıç','Bitiş','Açıklama'];
  const pg = document.getElementById('page');

  let sheetData = null;
  let search = '';
  let addActive = false;
  let addValues = [];
  let deleteConfirm = null;
  let saving = false;

  async function load() {
    sheetData = await fetchSheet(SHEET);
  }

  function getHeaders() { return (sheetData?.headers?.length ? sheetData.headers : DEFAULT_HEADERS); }
  function getRows() { return sheetData?.rows || []; }

  function getFiltered() {
    const rows = getRows();
    if (!search.trim()) return rows;
    const lower = trLower(search);
    return rows.filter(row=>row.some(c=>trLower(String(c??'')).includes(lower)));
  }

  function render() {
    const headers = getHeaders();
    const rows = getRows();
    const filtered = getFiltered();

    pg.innerHTML = `
      <div class="fullpage">
        <div class="fullpage-header">
          <div style="display:flex;align-items:center;gap:8px;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--sidebar-primary)" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="17" y1="11" x2="23" y2="11"/></svg>
            <div>
              <h1 style="font-size:14px;font-weight:700;">Müsait Personel</h1>
              <p style="font-size:11px;color:var(--muted-fg);">${rows.length} kayıt</p>
            </div>
          </div>
          <div style="display:flex;gap:8px;">
            <button class="btn btn-outline" style="padding:5px 8px;" onclick="musaitYenile()" title="Yenile">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
            </button>
            <button class="btn btn-primary" onclick="musaitAddStart()">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              Kişi Ekle
            </button>
          </div>
        </div>
        <div class="fullpage-search">
          <div class="search-wrap" style="max-width:300px;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" placeholder="Ara…" value="${escHtml(search)}" oninput="musaitSearch(this.value)" id="musait-search">
          </div>
        </div>
        <div class="fullpage-body">
          <table style="width:100%;">
            <thead>
              <tr>
                <th style="width:36px;">#</th>
                ${headers.map(h=>`<th>${escHtml(h)}</th>`).join('')}
                <th style="width:36px;"></th>
              </tr>
            </thead>
            <tbody>
              ${addActive?`<tr class="inline-add-row">
                <td style="padding:8px 10px;">
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                </td>
                ${headers.map((h,i)=>`<td style="padding:5px 5px;"><input class="inline-input" placeholder="${escHtml(h)}" value="${escHtml(addValues[i]||'')}" oninput="musaitAddVal(${i},this.value)" onkeydown="musaitAddKey(event,${i},${headers.length})" id="add-input-${i}"></td>`).join('')}
                <td style="padding:5px;"><div style="display:flex;gap:4px;">
                  <button onclick="musaitAddSave()" style="width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;color:var(--primary);">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
                  </button>
                  <button onclick="musaitAddCancel()" style="width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;color:var(--muted-fg);">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                  </button>
                </div></td>
              </tr>`:''}
              ${filtered.length===0&&!addActive?`<tr><td colspan="${headers.length+2}" style="text-align:center;padding:40px;color:var(--muted-fg);font-size:13px;">${search?'Arama sonucu bulunamadı':'Henüz kayıt yok'}</td></tr>`:''}
              ${filtered.map(row=>{
                const realIdx = getRows().indexOf(row);
                const isDel = deleteConfirm===realIdx;
                return `<tr style="cursor:default;" class="row-hover-group">
                  <td style="color:var(--muted-fg);font-size:11px;padding:9px 12px;opacity:0.5;">${realIdx+1}</td>
                  ${headers.map((_,i)=>`<td style="padding:9px 12px;font-size:13px;">${escHtml(String(row[i]??''))}</td>`).join('')}
                  <td style="padding:6px;text-align:right;">
                    ${isDel?`<div class="delete-confirm">
                      <button class="confirm-yes" onclick="musaitDeleteConfirm(${realIdx})">Sil</button>
                      <button onclick="musaitDeleteCancel()" style="padding:4px;color:var(--muted-fg);">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                      </button>
                    </div>`:
                    `<button onclick="musaitDeleteStart(${realIdx})" style="opacity:0;padding:5px;border-radius:5px;color:var(--muted-fg);transition:all 0.1s;" class="del-btn" onmouseover="this.style.opacity='1';this.style.background='hsl(0,70%,95%)';this.style.color='hsl(0,65%,45%)'" onmouseout="this.style.opacity='0';this.style.background='';this.style.color='var(--muted-fg)'">
                      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
                    </button>`}
                  </td>
                </tr>`;
              }).join('')}
            </tbody>
          </table>
        </div>
      </div>`;
    if (addActive) setTimeout(()=>document.getElementById('add-input-0')?.focus(),50);
  }

  window.musaitSearch = v => { search=v; render(); };
  window.musaitYenile = async () => { delete CACHE[SHEET]; await load(); render(); };
  window.musaitAddStart = () => { addValues=getHeaders().map(()=>''); addActive=true; render(); };
  window.musaitAddCancel = () => { addActive=false; render(); };
  window.musaitAddVal = (i,v) => { addValues[i]=v; };
  window.musaitAddKey = (e,i,total) => {
    if(e.key==='Tab'){e.preventDefault();const n=e.shiftKey?i-1:i+1;if(n>=0&&n<total)document.getElementById(`add-input-${n}`)?.focus();else if(n>=total)musaitAddSave();}
    if(e.key==='Enter'){if(i<total-1)document.getElementById(`add-input-${i+1}`)?.focus();else musaitAddSave();}
    if(e.key==='Escape')musaitAddCancel();
  };
  window.musaitAddSave = async () => {
    if(saving) return;
    const vals = getHeaders().map((_,i)=>addValues[i]||'');
    if(!vals.some(v=>v.trim())){musaitAddCancel();return;}
    saving=true;
    try{
      const isNew = !sheetData?.headers?.length;
      if(isNew) await postRow(SHEET, DEFAULT_HEADERS);
      await postRow(SHEET, vals);
      await load(); addActive=false; saving=false; render();
    } catch(e){saving=false;alert('Kayıt eklenemedi: '+e.message);}
  };
  window.musaitDeleteStart = i => { deleteConfirm=i; render(); };
  window.musaitDeleteCancel = () => { deleteConfirm=null; render(); };
  window.musaitDeleteConfirm = async i => {
    try{ await deleteRow(SHEET,i); await load(); deleteConfirm=null; render(); }
    catch(e){ alert('Silinemedi: '+e.message); }
  };

  try { await load(); render(); } catch(e) {
    pg.innerHTML = `<div class="empty"><p>Veri yüklenemedi: ${e.message}</p></div>`;
  }
}

          <p style="font-size:11px;font-weight:700;color:var(--primary);margin-bottom:8px;">+ Yeni Kayıt Ekle</p>
          <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;">
            ${['Oyun Adı','Kategori','Görev','Kişi'].map((h,i)=>`<div>

              <input class="inline-input" placeholder="${h}" value="${escHtml(addValues[i]||'')}" oninput="arsivAddVal(${i},this.value)" onkeydown="arsivAddKey(event,${i})" id="arsiv-add-${i}">

                      const realIdx = rawRows.findIndex(rr=>String(rr[0])===row.oyun&&String(rr[2])===row.gorev&&String(rr[3])===row.kisi);
                      const isDel = deleteConfirm===realIdx;
                      return `<tr style="border-top:1px solid hsla(38,18%,87%,0.5);">
                        <td style="padding:7px 12px;color:var(--muted-fg);font-size:11px;opacity:0.5;">${i+1}</td>
                        <td style="padding:7px 12px;font-weight:500;font-size:12px;">${escHtml(row.kisi)}</td>

                        <td style="padding:5px;">
                          ${isDel?`<div class="delete-confirm">
                            <button class="confirm-yes" onclick="arsivDeleteConfirm(${realIdx})">Sil</button>

                          </div>`:
                          `<button onclick="arsivDeleteStart(${realIdx})" style="opacity:0;padding:5px;border-radius:5px;color:var(--muted-fg);" onmouseover="this.style.opacity='1';this.style.background='hsl(0,70%,95%)';this.style.color='hsl(0,65%,45%)'" onmouseout="this.style.opacity='0';this.style.background='';this.style.color='var(--muted-fg)'">
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
                          </button>`}
                        </td>
                      </tr>`;
                    }).join('')}
                  </tbody>
                </table>
              </div>`:''}
            </div>`;
          }).join('')}
        </div>
      </div>`;
    if (addActive) setTimeout(()=>document.getElementById('arsiv-add-0')?.focus(),50);
  }

  window.arsivSearch = v => { search=v; render(); };
  window.arsivToggle = name => { expanded=expanded===name?null:name; render(); };
  window.arsivYenile = async () => { delete CACHE[SHEET]; await load(); render(); };
  window.arsivAddStart = () => { addValues=['','','','']; addActive=true; render(); };
  window.arsivAddCancel = () => { addActive=false; render(); };
  window.arsivAddVal = (i,v) => { addValues[i]=v; };
  window.arsivAddKey = (e,i) => {
    if(e.key==='Tab'){e.preventDefault();const n=e.shiftKey?i-1:i+1;if(n>=0&&n<4)document.getElementById(`arsiv-add-${n}`)?.focus();else if(n>=4)arsivAddSave();}
    if(e.key==='Enter'){if(i<3)document.getElementById(`arsiv-add-${i+1}`)?.focus();else arsivAddSave();}
    if(e.key==='Escape')arsivAddCancel();
  };
  window.arsivAddSave = async () => {
    if(saving) return;
    if(!addValues.some(v=>v.trim())){arsivAddCancel();return;}
    saving=true;
    try{ await postRow(SHEET,addValues); await load(); addActive=false; saving=false; render(); }
    catch(e){saving=false;alert('Kayıt eklenemedi: '+e.message);}
  };
  window.arsivDeleteStart = i => { deleteConfirm=i; render(); };
  window.arsivDeleteCancel = () => { deleteConfirm=null; render(); };
  window.arsivDeleteConfirm = async i => {
    try{ await deleteRow(SHEET,i); await load(); deleteConfirm=null; render(); }
    catch(e){alert('Silinemedi: '+e.message);}
  };

  try { await load(); render(); } catch(e) {
    pg.innerHTML = `<div class="empty"><p>Veri yüklenemedi: ${e.message}</p></div>`;
  }
}


/* ═══════════════════════════════════════════════════════════════

async function renderAdmin() {
  const pg = document.getElementById('page');
  const ROWS_PER_PAGE = 50;
  const PINNED = ['GÖREVLİ OLMAYAN','ARŞİV OYUNLAR','FİGÜRAN LİSTESİ'];

  // Şifre kontrolü
  const PIN_KEY = 'idt_pin';
  const AUTH_KEY = 'idt_admin_auth';
  const DEFAULT_PIN = '525327';
  function getPin(){ return localStorage.getItem(PIN_KEY)||DEFAULT_PIN; }
  function isAuth(){ return sessionStorage.getItem(AUTH_KEY)==='1'; }
  function setAuth(){ sessionStorage.setItem(AUTH_KEY,'1'); }

  if (!isAuth()) {
    pg.innerHTML = `
      <div style="display:flex;align-items:center;justify-content:center;height:100%;">
        <div style="background:var(--card);border:1px solid var(--border);border-radius:16px;padding:32px;width:320px;display:flex;flex-direction:column;gap:16px;">
          <h2 style="font-size:18px;font-weight:800;text-align:center;">🔒 Admin Girişi</h2>
          <input type="password" id="admin-pin" placeholder="Şifre..." style="height:40px;padding:0 12px;border:1px solid var(--border);border-radius:8px;font-size:14px;background:var(--background);outline:none;" onkeydown="if(event.key==='Enter')adminLogin()">
          <div id="admin-pin-err" style="font-size:12px;color:hsl(0,65%,50%);text-align:center;min-height:16px;"></div>
          <button onclick="adminLogin()" style="height:40px;background:var(--sidebar);color:var(--sidebar-primary);border-radius:8px;font-size:13px;font-weight:700;">Giriş Yap</button>
        </div>
      </div>`;
    window.adminLogin = () => {
      const inp = document.getElementById('admin-pin');
      if(inp.value===getPin()){setAuth();renderAdmin();}
      else{document.getElementById('admin-pin-err').textContent='Hatalı şifre!';inp.value='';setTimeout(()=>document.getElementById('admin-pin-err').textContent='',2000);}
    };
    setTimeout(()=>document.getElementById('admin-pin')?.focus(),50);
    return;
  }

  // Sheets listesi
  let sheets = [];
  let activeSheet = '';
  let sheetData = null;
  let search = '';
  let page = 1;
  let editCell = null; // {row, col}
  let deleteRowIdx = null;
  let insertAfterRow = null;
  let currentPlayIdx = 0;

  const PLAY_SHEETS = ['BÜTÜN OYUNLAR'];

  async function loadSheets() {
    try {
      const r = await fetch(BACKEND+'/api/sheets');
      const d = await r.json();
      sheets = d.sheets || [];
      // Pinned'ları sona ekle
      PINNED.forEach(p => { if(!sheets.includes(p)) sheets.push(p); });
      sheets = sheets.filter(s => !s.startsWith('__') && !s.startsWith('_SNAPSHOT') && s!=='LOG' && s!=='Log' && s!=='BİLDİRİMLER_ARŞİV' && s!=='BİLDİRİMLER');
    } catch(e) { sheets = PINNED; }
  }

  async function loadSheet(name) {
    sheetData = null;
    delete CACHE[name];
    try { sheetData = await fetchSheet(name); }
    catch(e) { sheetData = {headers:[],rows:[]}; }
    page = 1; editCell = null; deleteRowIdx = null; currentPlayIdx = 0;
  }

  function isPlayBased(name) { return PLAY_SHEETS.includes(name); }

  function getHeaders() {
    if(!sheetData) return [];
    return isPlayBased(activeSheet) ? sheetData.headers.slice(0,4) : sheetData.headers;
  }

  function getFilteredRows() {
    if(!sheetData) return [];
    if(!search.trim()) return sheetData.rows;
    const lower = trLower(search);
    return sheetData.rows.filter(row=>row.some(c=>trLower(String(c??'')).includes(lower)));
  }

  function getPlayGroups() {
    if(!isPlayBased(activeSheet)||!sheetData) return null;
    const map=new Map();
    sheetData.rows.forEach(row=>{
      const play=String(row[0]??'').trim();
      if(!map.has(play))map.set(play,[]);
      map.get(play).push(row);
    });
    return Array.from(map.entries()).map(([name,rows])=>({name,rows})).sort((a,b)=>a.name.localeCompare(b.name,'tr'));
  }

  function getPagedRows() {
    const filtered = getFilteredRows();
    if(isPlayBased(activeSheet)&&!search.trim()) {
      const groups=getPlayGroups()||[];
      return groups[currentPlayIdx]?.rows||[];
    }
    return filtered.slice((page-1)*ROWS_PER_PAGE, page*ROWS_PER_PAGE);
  }

  function render() {
    const headers=getHeaders();
    const paged=getPagedRows();
    const filtered=getFilteredRows();
    const totalPages=Math.max(1,Math.ceil(filtered.length/ROWS_PER_PAGE));
    const groups=getPlayGroups();
    const isPlay=isPlayBased(activeSheet);
    const curPlayName=isPlay&&groups?groups[currentPlayIdx]?.name||'':'';

    pg.innerHTML = `
      <div style="display:flex;flex-direction:column;height:100%;overflow:hidden;">

            <input type="text" placeholder="Ara..." value="${escHtml(search)}" oninput="adminSearch(this.value)">
          </div>
          <button onclick="adminRefresh()" style="padding:5px;border-radius:6px;color:var(--muted-fg);" title="Yenile">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
          </button>
          ${isPlay&&groups&&!search?`
            <div style="display:flex;align-items:center;gap:6px;margin-left:4px;">
              <button onclick="adminPlayPrev()" ${currentPlayIdx<=0?'disabled':''} style="padding:4px;border-radius:5px;color:var(--muted-fg);opacity:${currentPlayIdx<=0?'0.3':'1'};">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
              </button>
              <select onchange="adminPlaySelect(this.value)" style="height:28px;font-size:11px;border:1px solid var(--border);border-radius:6px;background:var(--card);padding:0 6px;max-width:200px;">
                ${(groups||[]).map((g,i)=>`<option value="${i}"${currentPlayIdx===i?' selected':''}>${escHtml(g.name)}</option>`).join('')}
              </select>
              <button onclick="adminPlayNext()" ${currentPlayIdx>=(groups?.length||1)-1?'disabled':''} style="padding:4px;border-radius:5px;color:var(--muted-fg);opacity:${currentPlayIdx>=(groups?.length||1)-1?'0.3':'1'};">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
              </button>
              <span style="font-size:11px;color:var(--muted-fg);">${currentPlayIdx+1}/${groups?.length||0}</span>
            </div>
          `:''}
          <div style="margin-left:auto;display:flex;align-items:center;gap:8px;">
            <span style="font-size:11px;color:var(--muted-fg);">${sheetData?sheetData.rows.length+' satır':''}</span>
            <button onclick="adminLogout()" style="font-size:11px;color:var(--muted-fg);padding:4px 8px;border:1px solid var(--border);border-radius:6px;">Çıkış</button>
          </div>
        </div>

        <!-- Oyun başlık -->
        ${isPlay&&curPlayName&&!search?`
        <div style="padding:6px 14px;border-bottom:1px solid var(--border);background:hsla(38,18%,92%,0.3);display:flex;align-items:center;gap:8px;flex-shrink:0;">
          <span style="font-size:12px;font-weight:700;">${escHtml(curPlayName)}</span>

                    </div>`:
                    `<button onclick="adminDeleteStart(${realIdx})" style="opacity:0;padding:5px;border-radius:5px;color:var(--muted-fg);" onmouseover="this.style.opacity='1';this.style.background='hsl(0,70%,95%)';this.style.color='hsl(0,65%,45%)'" onmouseout="this.style.opacity='0';this.style.background='';this.style.color='var(--muted-fg)'">
                      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
                    </button>`}
                  </td>
                </tr>`;
              }).join('')}
              <!-- Yeni satır ekle -->
              ${headers.length>0&&!search?`<tr style="border-top:2px dashed hsla(38,18%,87%,0.8);" id="add-row-tr">
                <td style="padding:8px 12px;color:var(--muted-fg);opacity:0.4;font-size:11px;">+</td>
                ${headers.map((h,i)=>`<td style="padding:5px 6px;"><input class="inline-input" placeholder="${escHtml(h)}" id="new-row-${i}" onkeydown="adminAddKey(event,${i},${headers.length})" style="width:100%;min-width:80px;"></td>`).join('')}
                <td style="padding:5px;"><button onclick="adminAddSave(${headers.length})" style="padding:5px 10px;background:var(--sidebar);color:var(--sidebar-primary);border-radius:6px;font-size:11px;font-weight:700;">Ekle</button></td>
              </tr>`:''}
            </tbody>
          </table>
        </div>

        <!-- Pagination -->
        ${!isPlay&&headers.length>0?`<div style="padding:8px 14px;border-top:1px solid var(--border);background:hsla(38,18%,92%,0.3);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;">
          <span style="font-size:11px;color:var(--muted-fg);">${filtered.length>0?(page-1)*ROWS_PER_PAGE+1+'–'+Math.min(page*ROWS_PER_PAGE,filtered.length)+' / '+filtered.length+' satır':'0 satır'}</span>
          <div style="display:flex;align-items:center;gap:4px;">
            <button onclick="adminPagePrev()" ${page<=1?'disabled':''} style="padding:4px;border-radius:5px;color:${page<=1?'var(--muted-fg)':'var(--foreground)'};opacity:${page<=1?'0.3':'1'};">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
            </button>
            <span style="font-size:11px;color:var(--muted-fg);padding:0 6px;">${page} / ${totalPages}</span>
            <button onclick="adminPageNext(${totalPages})" ${page>=totalPages?'disabled':''} style="padding:4px;border-radius:5px;color:${page>=totalPages?'var(--muted-fg)':'var(--foreground)'};opacity:${page>=totalPages?'0.3':'1'};">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
            </button>
          </div>
        </div>`:''}

        <!-- Sheet tabs -->
        <div style="display:flex;align-items:flex-end;overflow-x:auto;padding:4px 12px 0;background:hsla(38,18%,92%,0.5);border-top:1px solid var(--border);flex-shrink:0;min-height:36px;">
          ${sheets.map(name=>`<button onclick="adminSelectSheet(${jsq(name)})" style="padding:6px 12px;font-size:11px;font-weight:700;white-space:nowrap;border-radius:6px 6px 0 0;margin-right:2px;transition:all 0.15s;${activeSheet===name?'background:var(--card);border:1px solid var(--border);border-bottom:1px solid var(--card);margin-bottom:-1px;color:var(--foreground);':'background:transparent;color:var(--muted-fg);border:1px solid transparent;'}">${escHtml(name)}</button>`).join('')}
        </div>
      </div>`;

    // Hücre edit input focus
    if(editCell) setTimeout(()=>document.getElementById('cell-edit-input')?.focus(),30);
  }

  // API işlemleri
  async function apiCellUpdate(row,col,value) {
    const r=await fetch(BACKEND+'/api/sheets/'+encodeURIComponent(activeSheet)+'/cell',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({row,col,value})});
    if(!r.ok) throw new Error('Güncelleme hatası');
    delete CACHE[activeSheet];
    sheetData=await fetchSheet(activeSheet);
  }

  async function apiRowDelete(rowIndex) {
    const r=await fetch(BACKEND+'/api/sheets/'+encodeURIComponent(activeSheet)+'/row/'+rowIndex,{method:'DELETE'});
    if(!r.ok) throw new Error('Silme hatası');
    delete CACHE[activeSheet];
    sheetData=await fetchSheet(activeSheet);
  }

  async function apiRowAdd(values) {
    const r=await fetch(BACKEND+'/api/sheets/'+encodeURIComponent(activeSheet)+'/row',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({values})});
    if(!r.ok) throw new Error('Ekleme hatası');
    delete CACHE[activeSheet];
    sheetData=await fetchSheet(activeSheet);
  }

  // Window fonksiyonları
  window.adminSearch = v => { search=v; page=1; render(); };
  window.adminRefresh = async () => { delete CACHE[activeSheet]; sheetData=await fetchSheet(activeSheet); render(); };
  window.adminLogout = () => { sessionStorage.removeItem(AUTH_KEY); navigateTo('home'); };
  window.adminSelectSheet = async name => { activeSheet=name; await loadSheet(name); render(); };
  window.adminPlayPrev = () => { currentPlayIdx=Math.max(0,currentPlayIdx-1); render(); };
  window.adminPlayNext = () => { const g=getPlayGroups()||[]; currentPlayIdx=Math.min(g.length-1,currentPlayIdx+1); render(); };
  window.adminPlaySelect = i => { currentPlayIdx=Number(i); render(); };
  window.adminPagePrev = () => { page=Math.max(1,page-1); render(); };
  window.adminPageNext = total => { page=Math.min(total,page+1); render(); };
  window.adminEditCell = (row,col) => { editCell={row,col}; render(); };
  window.adminCellKey = async (e,row,col) => {
    if(e.key==='Enter'||e.key==='Tab'){e.preventDefault();await adminCellSave(row,col);}
    if(e.key==='Escape'){editCell=null;render();}
  };
  window.adminCellSave = async (row,col) => {
    const inp=document.getElementById('cell-edit-input');
    if(!inp){editCell=null;render();return;}
    const val=inp.value;
    const orig=String(sheetData?.rows[row]?.[col]??'');
    if(val===orig){editCell=null;render();return;}
    try{await apiCellUpdate(row,col,val);editCell=null;render();}
    catch(e){alert('Güncellenemedi: '+e.message);editCell=null;render();}
  };
  window.adminDeleteStart = i => { deleteRowIdx=i; render(); };
  window.adminDeleteCancel = () => { deleteRowIdx=null; render(); };
  window.adminDeleteConfirm = async i => {
    try{await apiRowDelete(i);deleteRowIdx=null;render();}
    catch(e){alert('Silinemedi: '+e.message);deleteRowIdx=null;render();}
  };
  window.adminAddKey = (e,i,total) => {
    if(e.key==='Tab'){e.preventDefault();const n=e.shiftKey?i-1:i+1;if(n>=0&&n<total)document.getElementById('new-row-'+n)?.focus();else if(n>=total)adminAddSave(total);}
    if(e.key==='Enter'){if(i<total-1)document.getElementById('new-row-'+(i+1))?.focus();else adminAddSave(total);}
    if(e.key==='Escape'){Array.from({length:total},(_,j)=>document.getElementById('new-row-'+j)?.value='');}
  };
  window.adminAddSave = async total => {
    const vals=Array.from({length:total},(_,i)=>document.getElementById('new-row-'+i)?.value||'');
    if(!vals.some(v=>v.trim())) return;
    try{await apiRowAdd(vals);Array.from({length:total},(_,i)=>{const inp=document.getElementById('new-row-'+i);if(inp)inp.value='';});render();}
    catch(e){alert('Eklenemedi: '+e.message);}
  };
  window.adminNewPlay = () => {
    const name=prompt('Yeni oyun adı:');
    if(name&&name.trim()) apiRowAdd([name.trim(),'','','']).then(()=>render());
  };
  window.adminArchivePlay = () => {
    const groups=getPlayGroups()||[];
    const playName=groups[currentPlayIdx]?.name;
    if(!playName||!confirm(playName+' arşive taşınsın mı?')) return;
    fetch(BACKEND+'/api/archive-play',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({playName})})
      .then(r=>{if(!r.ok)throw new Error();return r.json();})
      .then(()=>{delete CACHE[activeSheet];return loadSheet(activeSheet);})
      .then(()=>{currentPlayIdx=Math.max(0,currentPlayIdx-1);render();})
      .catch(()=>alert('Arşivleme başarısız'));
  };

  // Başlat
  await loadSheets();
  if(sheets.length){
    // BÜTÜN OYUNLAR öncelikli
    activeSheet = sheets.find(s=>s==='BÜTÜN OYUNLAR')||sheets[0];
    await loadSheet(activeSheet);
  }
  render();
}

/* ═══════════════════════════════════════════════════════════════
   UI BAŞLAT
═══════════════════════════════════════════════════════════════ */
document.addEventListener('DOMContentLoaded', () => {
  // Hamburger
  document.getElementById('hamburger').addEventListener('click', () => {
    document.getElementById('nav-row').classList.toggle('open');
  });

  // Tema (dark mode skeleton — ileride genişletilebilir)
  const themeBtn = document.getElementById('theme-btn');
  themeBtn.addEventListener('click', () => {
    document.documentElement.classList.toggle('dark');
    themeBtn.textContent = document.documentElement.classList.contains('dark') ? '☀️' : '🌙';
  });

  // İlk sayfa
  navigateTo('home');
});
</script>
</body>
</html>
